<div class="project-card">
  <h3>
    <a href="/ellemmatos/projects/{{ include.project.id }}/">
      {{ include.project.name }}
    </a>
  </h3>

  <p>
    {{ include.project.description }}
  </p>

  <p class="project-links">
    <a href="/ellemmatos/projects/{{ include.project.id }}/">View Project</a>
    {% if include.project.github %}
    <a href="{{ include.project.github }}">GitHub</a>
    {% endif %}
  </p>
</div>
