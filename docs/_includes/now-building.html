<section class="now-building">
  <h2>Now Building</h2>

  <ul class="now-building-list">
    {% for project in site.data.projects.projects limit:3 %}
    <li>
      <strong>
        <a href="/projects/{{ project.id }}/">
          {{ project.name }}
        </a>
      </strong>

      &mdash; {{ project.description }}
    </li>
    {% endfor %}
  </ul>
</section>
