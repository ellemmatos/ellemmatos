<section class="now-building">
  <h2>Now Building</h2>

  <ul class="now-building-list">
    {% assign active_projects = site.data.projects.projects | where: "status", "active" %}
    {% for project in active_projects limit:3 %}
    <li>
      <strong>
        <a href="/projects/{{ project.id }}/">
          {{ project.name }}
        </a>
      </strong>

      &mdash; {{ project.description }}
    </li>
    {% endfor %}
  </ul>
</section>
