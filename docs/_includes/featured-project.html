{% assign project = site.data.projects.projects | first %}

<section class="featured-project">
  <h2>Featured Project</h2>

  <div class="featured-project-card">
    <h3>
      <a href="/projects/{{ project.id }}/">
        {{ project.name }}
      </a>
    </h3>

    <p>
      {{ project.description }}
    </p>

    <p class="featured-links">
      <a href="/projects/{{ project.id }}/">Explore Project</a>

      {% if project.github %}
      <a href="{{ project.github }}">GitHub</a>
      {% endif %}
    </p>
  </div>
</section>
