<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.summary | default: site.description }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ page.image | default: site.social_image | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@{{ site.author.twitter }}">
    <meta name="twitter:creator" content="@{{ site.author.twitter }}">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.summary | default: site.description }}">
    <meta name="twitter:image" content="{{ page.image | default: site.social_image | absolute_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link rel="stylesheet" href="/ellemmatos/assets/css/style.css">
  </head>
  <body class="{% if page.layout == 'home' %}home{% endif %}">
    <header class="brand-header">
      <div class="brand-left">
        <a href="/ellemmatos/" class="nav-avatar">EM</a>
      </div>

      <nav class="brand-nav">
        {% for path in site.header_pages %}
          {% assign nav_page = site.pages | where: "path", path | first %}
          {% if nav_page %}
          <a href="{{ nav_page.url | relative_url }}" class="brand-link{% if page.url == nav_page.url %} active{% endif %}">{{ nav_page.title }}</a>
          {% endif %}
        {% endfor %}
      </nav>

      <div class="brand-right">
        <a href="/ellemmatos/" class="brand-link">Blog</a>
      </div>
    </header>

    <main class="page-content" aria-label="Content">
      {{ content }}
    </main>
  </body>
</html>
