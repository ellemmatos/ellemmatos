---
layout: default
---

<article class="blog-post">
  <nav class="post-nav">
    <a href="/ellemmatos/">&larr; Back to Blog</a>
  </nav>

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
